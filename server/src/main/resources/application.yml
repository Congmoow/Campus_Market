server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/campus_market?useSSL=false&serverTimezone=UTC&characterEncoding=utf8&createDatabaseIfNotExist=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  security:
    jwt:
      secret: "change_this_dev_secret_please"
      expiration-minutes: 120

logging:
  level:
    org.hibernate.SQL: warn
    org.springframework.security: info


